<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하루 플래너</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E91E8C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="하루플래너">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-brand">
        <div class="logo-mark"></div>
        <span class="header-title">하루 플래너</span>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="today">오늘</button>
      <button class="tab-btn" data-tab="todo">할 일</button>
      <button class="tab-btn" data-tab="routine">루틴</button>
      <button class="tab-btn" data-tab="stats">통계</button>
    </nav>

    <!-- ══ 오늘 (Timeline) ══ -->
    <div id="tab-today" class="tab-content active">
      <div class="tl-page">
        <div class="tl-topbar">
          <div class="tl-date-label" id="tlDate"></div>
          <div class="tl-topbar-right">
            <div class="snap-control">
              <span class="snap-label">스냅</span>
              <select id="snapSelect" class="snap-select">
                <option value="5">5분</option>
                <option value="10" selected>10분</option>
                <option value="15">15분</option>
                <option value="30">30분</option>
              </select>
            </div>
            <button class="btn-ghost" id="addBlockBtn">+ 추가</button>
          </div>
        </div>
        <div class="tl-two-panel">
          <div class="tl-main">
            <div class="tl-scroll" id="tlScroll">
              <div class="tl-inner" id="tlInner">
                <!-- JS renders hour lines, labels, blocks, now-line -->
              </div>
            </div>
          </div>
          <div class="tl-side">
            <div class="tl-side-header">할 일</div>
            <div id="tlAssignHint" class="tl-assign-hint hidden">블록을 눌러 배치</div>
            <div id="tlTodoList" class="tl-side-list"></div>
          </div>
        </div>
      </div>

      <!-- Quick-add popup (after drag / click) -->
      <div id="quickPopup" class="quick-popup hidden">
        <div class="qp-header">
          <span class="qp-color-dot" id="qpColorDot"></span>
          <span class="qp-time" id="qpTime"></span>
        </div>
        <input id="qpInput" class="qp-input" placeholder="블록 이름...">
        <div class="qp-actions">
          <button class="qp-detail" id="qpDetail">상세 편집</button>
          <div class="qp-right">
            <button class="qp-cancel" id="qpCancel">취소</button>
            <button class="qp-save" id="qpSave">저장</button>
          </div>
        </div>
      </div>

      <!-- Full block editor sheet (double-click) -->
      <div id="blockSheet" class="sheet hidden">
        <div class="sheet-backdrop" id="blockBackdrop"></div>
        <div class="sheet-panel">
          <div class="sheet-drag"></div>
          <div class="sheet-head">
            <span id="blockSheetTitle">블록 추가</span>
            <button class="btn-icon-danger hidden" id="deleteBlockBtn">삭제</button>
          </div>

          <div class="form-row">
            <label class="form-label">이름</label>
            <input id="blockLabel" class="form-input" placeholder="예) 딥워크, 점심식사, 운동">
          </div>

          <div class="form-row">
            <label class="form-label">시작 시간</label>
            <div class="time-inputs">
              <input id="blockStartH" class="form-input time-h" type="number" min="0" max="23" placeholder="09">
              <span class="time-sep">:</span>
              <input id="blockStartM" class="form-input time-m" type="number" min="0" max="59" step="5" placeholder="00">
            </div>
          </div>

          <div class="form-row">
            <label class="form-label">길이</label>
            <div class="duration-presets">
              <button class="dur-btn" data-min="15">15분</button>
              <button class="dur-btn" data-min="20">20분</button>
              <button class="dur-btn" data-min="30">30분</button>
              <button class="dur-btn" data-min="60">1시간</button>
              <button class="dur-btn" data-min="90">1.5시간</button>
              <button class="dur-btn" data-min="120">2시간</button>
              <button class="dur-btn" data-min="180">3시간</button>
              <button class="dur-btn" data-min="480">8시간</button>
            </div>
            <input id="blockDuration" class="form-input" type="number" min="5" placeholder="분 단위 입력" style="margin-top:6px">
          </div>

          <div class="form-row">
            <label class="form-label">색상</label>
            <div class="color-picker" id="blockColorPicker"></div>
          </div>

          <div class="form-row">
            <label class="form-label">이 블록의 할 일</label>
            <div id="blockTodoList" class="block-todo-list"></div>
            <div class="block-todo-add-row">
              <input id="blockTodoInput" class="form-input" placeholder="할 일 추가...">
              <button class="btn-sm-outline" id="blockTodoAddBtn">추가</button>
            </div>
          </div>

          <div class="sheet-actions">
            <button class="btn-outline" id="blockCancelBtn">취소</button>
            <button class="btn-primary" id="blockSaveBtn">저장</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ 할 일 ══ -->
    <div id="tab-todo" class="tab-content">
      <div class="page">
        <div class="page-topbar">
          <div>
            <h2 class="page-title">할 일</h2>
            <div class="page-sub" id="todayDateLabel"></div>
          </div>
          <div class="count-pill" id="todoBadge">0/0</div>
        </div>

        <div class="todo-compose">
          <div class="priority-group" id="priorityGroup">
            <button class="pri-btn" data-p="high" title="높음"></button>
            <button class="pri-btn active" data-p="medium" title="중간"></button>
            <button class="pri-btn" data-p="low" title="낮음"></button>
          </div>
          <input id="todoInput" class="form-input todo-compose-input" placeholder="새 할 일">
          <button class="btn-primary btn-sm" id="todoAddBtn">추가</button>
        </div>

        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="active">진행 중</button>
          <button class="filter-btn" data-filter="done">완료</button>
        </div>

        <div id="todoList" class="todo-list"></div>
      </div>
    </div>

    <!-- ══ 루틴 ══ -->
    <div id="tab-routine" class="tab-content">
      <div class="page">
        <div class="page-topbar">
          <h2 class="page-title">루틴</h2>
          <button class="btn-ghost" id="addRoutineBtn">+ 추가</button>
        </div>

        <div class="section-block">
          <div class="section-label">오늘</div>
          <div id="todayRoutineList"></div>
        </div>

        <div class="section-block">
          <div class="section-label">전체 루틴</div>
          <div id="allRoutineList"></div>
        </div>
      </div>

      <!-- Routine sheet -->
      <div id="routineSheet" class="sheet hidden">
        <div class="sheet-backdrop" id="routineBackdrop"></div>
        <div class="sheet-panel">
          <div class="sheet-drag"></div>
          <div class="sheet-head"><span>루틴 추가</span></div>

          <div class="form-row">
            <label class="form-label">이름</label>
            <input id="routineName" class="form-input" placeholder="예) 아침 운동, 독서 30분">
          </div>

          <div class="form-row">
            <label class="form-label">반복 요일</label>
            <div class="day-group" id="dayToggleGroup">
              <button class="day-btn" data-day="mon">월</button>
              <button class="day-btn" data-day="tue">화</button>
              <button class="day-btn" data-day="wed">수</button>
              <button class="day-btn" data-day="thu">목</button>
              <button class="day-btn" data-day="fri">금</button>
              <button class="day-btn" data-day="sat">토</button>
              <button class="day-btn" data-day="sun">일</button>
            </div>
          </div>

          <div class="sheet-actions">
            <button class="btn-outline" id="routineCancelBtn">취소</button>
            <button class="btn-primary" id="routineSaveBtn">저장</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ 통계 ══ -->
    <div id="tab-stats" class="tab-content">
      <div class="page">
        <div class="page-topbar">
          <h2 class="page-title">통계</h2>
          <div class="page-sub" id="statsDateLabel"></div>
        </div>

        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-label">오늘 할 일</div>
            <div class="stat-value" id="statTodo">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">오늘 루틴</div>
            <div class="stat-value" id="statRoutine">—</div>
          </div>
        </div>

        <div class="section-block">
          <div class="section-label">주간 할 일 완료율</div>
          <div id="weekChart" class="week-chart-wrap"></div>
        </div>

        <div class="section-block">
          <div class="section-label">루틴 연속 기록</div>
          <div id="streakList"></div>
        </div>
      </div>
    </div>

  </div>
  <script src="Script.js"></script>
</body>
</html>
